<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ergonomic Orthopedic Support - Restorative Sleep Solutions</title>
    <style>
        :root {
            --primary-accent: #3b82f6;
            --primary-hover: #1d4ed8;
            --success-green: #10b981;
            --danger-red: #ef4444;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --bg-body: #f9fafb;
            --bg-card: #ffffff;
            --bg-alert: #fef2f2;
            --max-width: 1000px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 20px;
            text-align: center;
        }

        .advertorial-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #9ca3af;
            font-weight: 700;
        }

        .wrapper {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 24px;
        }

        .hero-block {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            margin-bottom: 32px;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 800;
            color: #111827;
            line-height: 1.25;
            margin-bottom: 16px;
            text-align: center;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            text-align: center;
            max-width: 800px;
            margin: 0 auto 32px auto;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 40px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
            h1 { font-size: 1.9rem; }
            .hero-block { padding: 20px; }
        }

        .responsive-media {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            display: block;
            margin: 0 auto;
        }

        .full-width-media {
            width: 100%;
            max-width: 750px;
            display: block;
            margin: 24px auto;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .feature-list {
            list-style: none;
        }

        .feature-list li {
            position: relative;
            padding-left: 32px;
            margin-bottom: 16px;
            font-size: 1.05rem;
            color: var(--text-main);
        }

        .feature-list li::before {
            content: "✓";
            position: absolute;
            left: 0;
            top: 2px;
            width: 20px;
            height: 20px;
            background: #d1fae5;
            color: var(--success-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.75rem;
        }

        .btn-anchor {
            display: block;
            background-color: var(--primary-accent);
            color: #ffffff;
            padding: 18px 32px;
            font-size: 1.3rem;
            font-weight: 700;
            text-decoration: none;
            border-radius: 50px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.25);
            transition: all 0.2s ease-in-out;
            margin: 24px 0;
        }

        .btn-anchor:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.35);
        }

        .alert-box {
            background-color: var(--bg-alert);
            border-left: 4px solid var(--danger-red);
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 32px;
        }

        .alert-box h2 {
            color: #991b1b;
            font-size: 1.4rem;
            margin-bottom: 12px;
        }

        .feature-banner {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            padding: 40px;
            border-radius: 16px;
            margin-bottom: 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }

        .pricing-header {
            text-align: center;
            margin: 48px 0 24px 0;
        }

        footer {
            background-color: #111827;
            color: #9ca3af;
            padding: 48px 24px;
            text-align: center;
            font-size: 0.85rem;
            margin-top: 80px;
            border-top: 1px solid #1f2937;
            line-height: 1.7;
        }

        footer .legal-text {
            max-width: 850px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <header>
        <div class="advertorial-badge">Independent Sleep Health Editorial Review</div>
    </header>

    <div class="wrapper">
        
        <section class="hero-block">
            <h1>Do You Wake
